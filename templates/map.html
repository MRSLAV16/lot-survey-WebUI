<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Survey Lot Viewer</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body {
    background:#020617;
}

.navbar-title {
    position:absolute;
    left:50%;
    transform:translateX(-50%);
}

#map {
    height:70vh;
    border-radius:8px;
}

.edge-label {
    color:yellow;
    font-size:11px;
    font-weight:bold;
}

footer {
    text-align:center;
    font-size:12px;
    color:#9ca3af;
    padding:12px;
}

</style>

</head>


<body>


<nav class="navbar navbar-dark bg-black position-relative">

<div class="container-fluid">

<span class="navbar-title">
Survey Lot Viewer
</span>

<span class="text-light small">
User: {{ username }}
</span>

<a href="/logout" class="btn btn-danger btn-sm ms-3">
Logout
</a>

</div>

</nav>


<div class="container mt-3">

<div class="row g-2">

<div class="col-auto">

<input
type="file"
id="csvFile"
class="form-control bg-dark text-light border-secondary"
accept=".csv"
>

</div>

<div class="col-auto">

<button
class="btn btn-primary"
onclick="uploadCSV()"
>
Plot Lot
</button>

</div>

<div class="col-auto">

<button
class="btn btn-outline-light"
onclick="downloadGeoJSON()"
>
Download GeoJSON
</button>

</div>

</div>

</div>


<div class="container mt-3">

<div id="map"></div>

</div>


<div class="container text-center mt-3">

<h3 id="acreDisplay">0.000 ekar</h3>

</div>


<footer>
© 2026 DanishHaikal@DGU4C
</footer>


<script>

const currentUser = "{{ username }}"

const map = L.map("map").setView([2.0,103.5],18)

L.tileLayer(
"https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",
{maxZoom:21}
).addTo(map)

let lotLayer = null
let labelLayer = L.layerGroup().addTo(map)
let currentGeoJSON = null


function uploadCSV(){

const file = document.getElementById("csvFile").files[0]

if(!file){
alert("Select CSV file")
return
}

const formData = new FormData()
formData.append("file",file)

fetch("/upload_csv",{
method:"POST",
body:formData
})
.then(res=>res.json())
.then(data=>{
drawLot(data)
})

}


function drawLot(data){

currentGeoJSON = data

if(lotLayer){
map.removeLayer(lotLayer)
}

labelLayer.clearLayers()

lotLayer = L.geoJSON(data.polygon,{
style:{color:"#ffffff",weight:3}
}).addTo(map)

const coords = data.polygon.geometry.coordinates[0].map(c=>[c[1],c[0]])

map.fitBounds(lotLayer.getBounds())

const edges = data.polygon.properties.edges

for(let i=0;i<edges.length;i++){

const p1 = coords[i]
const p2 = coords[i+1]

const mid = [
(p1[0]+p2[0])/2,
(p1[1]+p2[1])/2
]

L.marker(mid,{
icon:L.divIcon({
className:"edge-label",
html:`${edges[i].distance} m<br>${edges[i].bearing}°`
})
}).addTo(labelLayer)

}

document.getElementById("acreDisplay").innerText =
data.polygon.properties.acre + " ekar"

lotLayer.bindPopup(`
<b>MAKLUMAT TANAH</b><br>
Pemilik: ${data.polygon.properties.owner}<br>
Luas: ${data.polygon.properties.area_m2} m²<br>
Perimeter: ${data.polygon.properties.perimeter} m
`)

}


function downloadGeoJSON(){

if(!currentGeoJSON){
alert("No lot to export")
return
}

const data = JSON.stringify(currentGeoJSON.polygon)

const blob = new Blob([data],{type:"application/json"})
const url = URL.createObjectURL(blob)

const a = document.createElement("a")
a.href = url
a.download = "lot.geojson"
a.click()

}

</script>

</body>
</html>
