<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Survey Lot Viewer</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body {
    background: #020617;
}

/* navbar title centered */

.navbar-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-weight: 600;
}

/* toolbar */

.toolbar {
    background: #0f172a;
    border-bottom: 1px solid #1f2937;
}

/* map container */

.map-wrapper {
    padding: 20px;
}

#map {
    height: 70vh;
    border-radius: 8px;
}

/* footer */

footer {
    text-align: center;
    color: #9ca3af;
    font-size: 12px;
    padding: 12px;
}

</style>

</head>


<body>


<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-black position-relative">

    <div class="container-fluid">

        <span class="navbar-title">
            Survey Lot Viewer
        </span>

        <a href="/logout" class="btn btn-danger btn-sm ms-auto">
            Logout
        </a>

    </div>

</nav>


<!-- TOOLBAR -->

<div class="container-fluid toolbar py-3">

    <div class="container">

        <div class="row g-2 align-items-center">

            <div class="col-auto">

                <input
                    type="file"
                    id="csvFile"
                    class="form-control bg-dark text-light border-secondary"
                    accept=".csv"
                >

            </div>

            <div class="col-auto">

                <button
                    class="btn btn-primary"
                    onclick="uploadCSV()"
                >
                    Plot Lot
                </button>

            </div>

        </div>

    </div>

</div>


<!-- MAP -->

<div class="container map-wrapper">

    <div id="map"></div>

</div>


<footer>

    © 2026 DanishHaikal@DGU4C

</footer>


<script>

/* ==============================
   Map Initialization
============================== */

const map = L.map("map").setView([2.0, 103.5], 18);

L.tileLayer(
    "https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",
    { maxZoom: 21 }
).addTo(map);

let lotLayer = null;
let stationLayer = L.layerGroup().addTo(map);


/* ==============================
   Upload CSV
============================== */

function uploadCSV() {

    const file = document.getElementById("csvFile").files[0];

    if (!file) {

        alert("Please select a CSV file.");
        return;
    }

    const formData = new FormData();
    formData.append("file", file);

    fetch("/upload_csv", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {

        if (data.error) {

            alert(data.error);
            return;
        }

        drawLot(data);

    })
    .catch(error => {

        console.error(error);
        alert("Upload failed.");

    });

}


/* ==============================
   Draw Lot
============================== */

function drawLot(data) {

    if (lotLayer) {

        map.removeLayer(lotLayer);
    }

    stationLayer.clearLayers();

    lotLayer = L.geoJSON(data.polygon, {

        style: {
            color: "#ffffff",
            weight: 3
        }

    }).addTo(map);

    const bounds = lotLayer.getBounds();

    if (bounds.isValid()) {

        map.fitBounds(bounds, {
            padding: [40, 40]
        });
    }

    data.stations.forEach(point => {

        const marker = L.marker([point.lat, point.lon])
            .bindPopup("STN: " + point.stn);

        stationLayer.addLayer(marker);

    });

}

</script>

</body>
</html>
