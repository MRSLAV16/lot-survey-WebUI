<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Reset Password</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet"
>

<style>

body{
    background:#020617;
}

.card-bg{
    background:#0f172a;
    border:none;
}

footer{
    position:fixed;
    bottom:0;
    width:100%;
    text-align:center;
    font-size:12px;
    color:#9ca3af;
}

</style>

</head>


<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="card card-bg shadow-lg" style="width:360px">

<div class="card-body p-4">

<h4 class="text-center mb-4">
Reset Password
</h4>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form method="POST" action="/forgot">

<div class="mb-3">

<label class="form-label">
Username
</label>

<input
type="text"
name="username"
class="form-control bg-dark text-light border-secondary"
required
>

</div>

<div class="mb-3">

<label class="form-label">
New Password
</label>

<input
type="password"
name="password"
class="form-control bg-dark text-light border-secondary"
required
>

</div>

<button
type="submit"
class="btn btn-warning w-100"
>
Reset Password
</button>

</form>

<div class="text-center mt-3">

<a href="/login" class="text-secondary">
Back to login
</a>

</div>

</div>

</div>

</div>

<footer>
© 2026 DanishHaikal@DGU4C
</footer>

</body>
</html>
