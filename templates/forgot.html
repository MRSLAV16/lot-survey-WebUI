<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Change Password</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #020617; }
    .card-bg { background: #0f172a; border: none; }
    footer { position: fixed; bottom: 0; width: 100%; text-align: center; color: #9ca3af; font-size: 12px; }
  </style>
</head>
<body>

<div class="container vh-100 d-flex justify-content-center align-items-center">
  <div class="card card-bg shadow-lg" style="width:360px;">
    <div class="card-body p-4">

      <h4 class="text-center mb-3">Change Password</h4>

      {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('change_password') }}" onsubmit="return validatePasswords()">
        <!-- CSRF token required by flask-wtf -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
          <label class="form-label">New password</label>
          <input type="password" name="password" id="password" class="form-control bg-dark text-light border-secondary" required minlength="6" />
          <div class="form-text text-muted">Minimum 6 characters.</div>
        </div>

        <div class="mb-3">
          <label class="form-label">Confirm password</label>
          <input type="password" id="password_confirm" class="form-control bg-dark text-light border-secondary" required minlength="6" />
        </div>

        <button type="submit" class="btn btn-warning w-100">Update password</button>
      </form>

      <div class="text-center mt-3">
        <a href="{{ url_for('login') }}" class="text-secondary">Back to login</a>
      </div>

    </div>
  </div>
</div>

<footer>© 2026 DanishHaikal@DGU4C</footer>

<script>
  function validatePasswords() {
    const p = document.getElementById('password').value;
    const q = document.getElementById('password_confirm').value;

    if (p !== q) {
      alert('Passwords do not match.');
      return false;
    }

    if (p.length < 6) {
      alert('Password must be at least 6 characters.');
      return false;
    }

    return true;
  }
</script>

</body>
</html>
